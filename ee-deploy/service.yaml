# Kubernetes Service for CDS-Assist
# ClusterIP exposes the app within the cluster
apiVersion: v1
kind: Service
metadata:
  name: cds-assist
  labels:
    app: cds-assist
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: cds-assist
